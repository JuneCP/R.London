<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>R. London — Gifts & Home Decor (Member)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --tiffany:       #81D8D0;
    --tiffany-deep:  #4BBFB8;
    --tiffany-light: #C2EEEB;
    --tiffany-pale:  #EAF8F7;
    --tiffany-dark:  #2A9D97;
    --ink:           #1C2B2A;
    --ink-mid:       #3D5250;
    --ink-soft:      #6B8886;
    --white:         #FFFFFF;
    --off-white:     #F5FBFA;
    --border:        #D4EFED;
    --red:           #C0392B;
    --gold:          #B8935A;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--off-white);
    color: var(--ink);
    min-height: 100vh;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  /* ---- NAV ---- */
  nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600; letter-spacing: 0.12em;
    color: var(--ink); text-decoration: none;
  }
  .nav-logo span { color: var(--tiffany-dark); }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    font-size: 13px; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-mid);
    text-decoration: none; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--tiffany-dark); }
  .nav-right { display: flex; align-items: center; gap: 20px; }
  .cart-btn {
    position: relative; background: var(--tiffany); border: none;
    border-radius: 50px; padding: 9px 22px;
    font-family: 'Jost', sans-serif; font-size: 13px;
    font-weight: 500; letter-spacing: 0.08em;
    color: var(--white); cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.2s, transform 0.15s;
  }
  .cart-btn:hover { background: var(--tiffany-dark); }
  .cart-count {
    background: var(--ink); color: var(--white);
    border-radius: 50%; width: 18px; height: 18px;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .cart-count.bump { transform: scale(1.5); }

  /* ---- HERO BANNER ---- */
  .hero {
    background: linear-gradient(135deg, var(--tiffany-pale) 0%, var(--tiffany-light) 60%, var(--tiffany) 100%);
    padding: 60px 40px 50px;
    display: flex; align-items: center; justify-content: space-between;
    overflow: hidden; position: relative;
  }
  .hero::before {
    content: '';
    position: absolute; right: -60px; top: -60px;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute; left: 40%; bottom: -80px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    pointer-events: none;
  }
  .hero-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px; font-weight: 300; line-height: 1.1;
    color: var(--ink); letter-spacing: 0.02em;
  }
  .hero-text h1 em { font-style: italic; color: var(--tiffany-dark); }
  .hero-text p {
    margin-top: 12px; font-size: 15px; color: var(--ink-mid);
    font-weight: 300; line-height: 1.6; max-width: 380px;
  }
  .hero-badge {
    background: var(--white); border-radius: 12px;
    padding: 16px 28px; text-align: center;
    box-shadow: 0 8px 32px rgba(74, 191, 184, 0.18);
    position: relative; z-index: 1;
  }
  .hero-badge span {
    display: block; font-family: 'Cormorant Garamond', serif;
    font-size: 38px; font-weight: 600; color: var(--tiffany-dark);
    line-height: 1;
  }
  .hero-badge small {
    font-size: 12px; color: var(--ink-soft);
    letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
  }

  /* ---- SECTION ---- */
  .section { padding: 48px 40px; }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 400; color: var(--ink);
    margin-bottom: 6px; letter-spacing: 0.03em;
  }
  .section-sub {
    font-size: 13px; color: var(--ink-soft);
    letter-spacing: 0.06em; text-transform: uppercase;
    font-weight: 500; margin-bottom: 28px;
  }

  /* ---- PRODUCT GRID ---- */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 24px;
  }
  .product-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: box-shadow 0.25s, transform 0.25s;
    cursor: pointer;
  }
  .product-card:hover {
    box-shadow: 0 12px 40px rgba(74,191,184,0.14);
    transform: translateY(-3px);
  }
  .product-img {
    width: 100%; aspect-ratio: 1/1;
    object-fit: cover; display: block;
    background: var(--tiffany-pale);
    position: relative; overflow: hidden;
  }
  .product-badge {
    position: absolute; top: 12px; left: 12px;
    background: var(--tiffany-dark); color: var(--white);
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 4px 10px; border-radius: 50px;
  }
  .product-info { padding: 16px 18px 18px; }
  .product-cat {
    font-size: 10px; color: var(--tiffany-dark);
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
    margin-bottom: 5px;
  }
  .product-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-weight: 500; color: var(--ink);
    line-height: 1.3; margin-bottom: 10px;
  }
  .product-price-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 14px;
  }
  .price-old {
    font-size: 13px; color: var(--ink-soft);
    text-decoration: line-through;
  }
  .price-new { font-size: 17px; font-weight: 600; color: var(--ink); }
  .price-new.sale { color: var(--red); }
  /* ---- MEMBER PRICE ---- */
  .member-price-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px;
  }
  .member-badge {
    background: #C0392B; color: #fff;
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 50px;
    flex-shrink: 0;
  }
  .member-price {
    font-size: 15px; font-weight: 700; color: #C0392B;
  }

  /* ---- RECO ADD-ON DEAL ---- */
  .addon-badge {
    display: inline-block;
    background: linear-gradient(90deg, #B8935A, #d4aa70);
    color: #fff; font-size: 9px; font-weight: 700;
    letter-spacing: 0.09em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 50px; margin-bottom: 4px;
  }
  .reco-addon-price {
    font-size: 13px; font-weight: 700; color: #B8935A;
    display: block; line-height: 1.2;
  }
  .reco-price-new.addon-deal { color: #B8935A; }

  .add-cart-btn {
    width: 100%; background: var(--tiffany-pale);
    border: 1.5px solid var(--tiffany);
    color: var(--tiffany-dark); font-family: 'Jost', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: 0.08em;
    padding: 10px; border-radius: 8px; cursor: pointer;
    transition: background 0.2s, color 0.2s;
    text-transform: uppercase;
  }
  .add-cart-btn:hover {
    background: var(--tiffany-dark); color: var(--white);
    border-color: var(--tiffany-dark);
  }
  .add-cart-btn.added {
    background: var(--tiffany-dark); color: var(--white);
    border-color: var(--tiffany-dark);
  }

  /* ---- CART DRAWER OVERLAY ---- */

    position: fixed; inset: 0;
    background: rgba(28,43,42,0.35);
    z-index: 200; opacity: 0;
    pointer-events:
