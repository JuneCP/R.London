<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In / Register — R. London</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --tiffany:       #81D8D0;
    --tiffany-deep:  #4BBFB8;
    --tiffany-light: #C2EEEB;
    --tiffany-pale:  #EAF8F7;
    --tiffany-dark:  #2A9D97;
    --ink:           #1C2B2A;
    --ink-mid:       #3D5250;
    --ink-soft:      #6B8886;
    --white:         #FFFFFF;
    --off-white:     #F5FBFA;
    --border:        #D4EFED;
  }
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Jost', sans-serif;
    background-color: var(--off-white);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  
  nav {
    width: 100%; height: 70px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    position: fixed; top: 0; z-index: 100;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 500; color: var(--ink);
    text-decoration: none; letter-spacing: 0.02em;
  }
  .nav-logo span { color: var(--tiffany-deep); }
  
  .auth-wrapper {
    margin-top: 120px;
    width: 100%; max-width: 420px;
    padding: 0 20px;
  }
  
  .auth-box {
    background: var(--white);
    padding: 40px;
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 30px rgba(129,216,208,0.08);
    text-align: center;
  }
  
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 500;
    margin-bottom: 24px;
  }
  
  .input-group { margin-bottom: 16px; text-align: left; }
  .input-group input {
    width: 100%; padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Jost', sans-serif;
    font-size: 15px; color: var(--ink);
    outline: none; transition: all 0.2s;
  }
  .input-group input::placeholder { color: var(--ink-soft); }
  .input-group input:focus {
    border-color: var(--tiffany-deep);
    box-shadow: 0 0 0 3px var(--tiffany-pale);
  }
  
  .submit-btn {
    width: 100%; padding: 14px;
    background: var(--tiffany-dark);
    color: var(--white);
    border: none; border-radius: 6px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    font-family: 'Jost', sans-serif;
    margin-top: 8px; transition: background 0.2s;
  }
  .submit-btn:hover { background: var(--tiffany-deep); }
  
  .divider {
    margin: 28px 0; display: flex; align-items: center;
    color: var(--ink-soft); font-size: 14px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .divider span { padding: 0 14px; }
  
  .social-btn {
    width: 100%; padding: 14px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px; margin-bottom: 12px;
    font-size: 15px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 12px; font-family: 'Jost', sans-serif;
    color: var(--ink); transition: all 0.2s;
  }
  .social-btn:hover {
    background: var(--tiffany-pale);
    border-color: var(--tiffany);
  }
</style>
</head>
<body>

<nav>
  <a href="homepage-member.html" class="nav-logo">R<span>.</span> London</a>
</nav>

<div class="auth-wrapper">
  <div class="auth-box">
    <h1>Welcome</h1>
    
    <form onsubmit="event.preventDefault(); window.location.href='homepage-member.html';">
      <div class="input-group">
        <input type="email" placeholder="Email Address" required />
      </div>
      <div class="input-group">
        <input type="password" placeholder="Password" required />
      </div>
      <button type="submit" class="submit-btn">Continue</button>
    </form>
    
    <div class="divider"><span>or connect with</span></div>
    
    <button class="social-btn" type="button" onclick="window.location.href='homepage-member.html';">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25C22.56 11.47 22.49 10.72 22.36 10H12V14.26H17.92C17.67 15.63 16.89 16.81 15.73 17.58V20.35H19.3C21.39 18.43 22.56 15.6 22.56 12.25Z" fill="#4285F4"/>
        <path d="M12 23C14.97 23 17.46 22.02 19.3 20.35L15.73 17.58C14.73 18.25 13.48 18.66 12 18.66C9.13 18.66 6.71 16.72 5.84 14.13H2.17V16.98C4.01 20.64 7.72 23 12 23Z" fill="#34A853"/>
        <path d="M5.84 14.13C5.62 13.47 5.5 12.75 5.5 12C5.5 11.25 5.62 10.53 5.84 9.87V7.02H2.17C1.41 8.53 1 10.22 1 12C1 13.78 1.41 15.47 2.17 16.98L5.84 14.13Z" fill="#FBBC05"/>
        <path d="M12 5.34C13.62 5.34 15.07 5.9 16.21 6.98L19.39 3.8C17.45 2 14.97 1 12 1C7.72 1 4.01 3.36 2.17 7.02L5.84 9.87C6.71 7.28 9.13 5.34 12 5.34Z" fill="#EA4335"/>
      </svg>
      Sign up with Google
    </button>
    
    <button class="social-btn" type="button" onclick="window.location.href='homepage-member.html';">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 12.073C24 5.405 18.627 0 12 0C5.373 0 0 5.405 0 12.073C0 18.106 4.418 23.094 10.125 24V15.562H7.078V12.073H10.125V9.412C10.125 6.388 11.916 4.717 14.658 4.717C15.97 4.717 17.344 4.952 17.344 4.952V7.933H15.831C14.34 7.933 13.875 8.868 13.875 9.828V12.073H17.203L16.671 15.562H13.875V24C19.582 23.094 24 18.106 24 12.073Z" fill="#1877F2"/>
        <path d="M16.671 15.562L17.203 12.073H13.875V9.828C13.875 8.868 14.34 7.933 15.831 7.933H17.344V4.952C17.344 4.952 15.97 4.717 14.658 4.717C11.916 4.717 10.125 6.388 10.125 9.412V12.073H7.078V15.562H10.125V24C10.742 24.095 11.368 24.146 12 24.146C12.632 24.146 13.258 24.095 13.875 24V15.562H16.671Z" fill="white"/>
      </svg>
      Sign up with Facebook
    </button>
  </div>
</div>

</body>
</html>
